services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: contracthawk
      POSTGRES_USER: contracthawk
      POSTGRES_PASSWORD: contracthawk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contracthawk"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: contracthawk
      RABBITMQ_DEFAULT_PASS: contracthawk
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/contracthawk
      SPRING_DATASOURCE_USERNAME: contracthawk
      SPRING_DATASOURCE_PASSWORD: contracthawk
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: contracthawk
      SPRING_RABBITMQ_PASSWORD: contracthawk
      CONTRACTHAWK_STORAGE_DIR: /data/contracts
    volumes:
      - backend-data:/data/contracts
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres-data:
  backend-data:
